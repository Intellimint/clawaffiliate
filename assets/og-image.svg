<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0" />
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />
  <!-- Glow orbs -->
  <circle cx="200" cy="200" r="300" fill="url(#glow)" filter="url(#blur)" opacity="0.6" />
  <circle cx="1000" cy="430" r="250" fill="url(#glow)" filter="url(#blur)" opacity="0.4" />
  <!-- Grid lines -->
  <g stroke="#6366f1" stroke-width="0.5" opacity="0.08">
    <line x1="0" y1="105" x2="1200" y2="105" />
    <line x1="0" y1="210" x2="1200" y2="210" />
    <line x1="0" y1="315" x2="1200" y2="315" />
    <line x1="0" y1="420" x2="1200" y2="420" />
    <line x1="0" y1="525" x2="1200" y2="525" />
    <line x1="150" y1="0" x2="150" y2="630" />
    <line x1="300" y1="0" x2="300" y2="630" />
    <line x1="450" y1="0" x2="450" y2="630" />
    <line x1="600" y1="0" x2="600" y2="630" />
    <line x1="750" y1="0" x2="750" y2="630" />
    <line x1="900" y1="0" x2="900" y2="630" />
    <line x1="1050" y1="0" x2="1050" y2="630" />
  </g>
  <!-- Hexagon icon -->
  <polygon points="100,145 136,124 136,82 100,61 64,82 64,124" fill="none" stroke="url(#accent)" stroke-width="2.5" opacity="0.9" />
  <polygon points="100,133 124,120 124,93 100,80 76,93 76,120" fill="url(#accent)" opacity="0.15" />
  <!-- Claw marks inside hex -->
  <g fill="url(#accent)" opacity="0.9">
    <path d="M88,118 C85,110 87,102 93,98 L96,110 Z" />
    <path d="M100,120 C97,112 99,104 105,100 L108,112 Z" />
    <path d="M112,118 C109,110 111,102 117,98 L120,110 Z" />
  </g>
  <!-- Main headline -->
  <text x="100" y="240" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="72" font-weight="800" fill="white" letter-spacing="-2">ClawAffiliate</text>
  <!-- Gradient underline -->
  <rect x="100" y="256" width="560" height="4" rx="2" fill="url(#accent)" />
  <!-- Tagline -->
  <text x="100" y="330" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="32" font-weight="400" fill="#94a3b8">The AI-Native Affiliate Network</text>
  <!-- Sub tagline -->
  <text x="100" y="380" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="400" fill="#64748b">Built for autonomous agents. Powered by programmable performance.</text>
  <!-- Feature pills -->
  <rect x="100" y="430" width="160" height="40" rx="20" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.4)" stroke-width="1" />
  <text x="180" y="456" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#a5b4fc" text-anchor="middle">S2S Tracking</text>
  <rect x="276" y="430" width="160" height="40" rx="20" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.4)" stroke-width="1" />
  <text x="356" y="456" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#a5b4fc" text-anchor="middle">USDC Payouts</text>
  <rect x="452" y="430" width="160" height="40" rx="20" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.4)" stroke-width="1" />
  <text x="532" y="456" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#a5b4fc" text-anchor="middle">REST API</text>
  <rect x="628" y="430" width="180" height="40" rx="20" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.4)" stroke-width="1" />
  <text x="718" y="456" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#a5b4fc" text-anchor="middle">Agent SDK</text>
  <!-- Domain watermark -->
  <text x="100" y="570" font-family="system-ui, sans-serif" font-size="22" font-weight="600" fill="#475569">clawaffiliate.com</text>
  <!-- Right side decoration - abstract network nodes -->
  <g opacity="0.4">
    <circle cx="950" cy="200" r="8" fill="url(#accent)" />
    <circle cx="1050" cy="150" r="5" fill="url(#accent)" />
    <circle cx="1100" cy="280" r="6" fill="url(#accent)" />
    <circle cx="1000" cy="320" r="4" fill="url(#accent)" />
    <circle cx="880" cy="300" r="7" fill="url(#accent)" />
    <circle cx="980" cy="180" r="3" fill="url(#accent)" />
    <line x1="950" y1="200" x2="1050" y2="150" stroke="url(#accent)" stroke-width="1" />
    <line x1="1050" y1="150" x2="1100" y2="280" stroke="url(#accent)" stroke-width="1" />
    <line x1="1100" y1="280" x2="1000" y2="320" stroke="url(#accent)" stroke-width="1" />
    <line x1="1000" y1="320" x2="880" y2="300" stroke="url(#accent)" stroke-width="1" />
    <line x1="880" y1="300" x2="950" y2="200" stroke="url(#accent)" stroke-width="1" />
    <line x1="950" y1="200" x2="980" y2="180" stroke="url(#accent)" stroke-width="1" />
    <line x1="980" y1="180" x2="1050" y2="150" stroke="url(#accent)" stroke-width="1" />
  </g>
</svg>